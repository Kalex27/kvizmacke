<ion-header>
  <ion-toolbar>
    <ion-title>Prijava</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form #logInForm="ngForm" (ngSubmit)="onLogIn(logInForm)">
    <ion-grid>
      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-list>
            <ion-item>
              <ion-input type="email" label="Email" labelPlacement="floating"
                         #email="ngModel" ngModel email required name="email" ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input type="password" label="Lozinka" labelPlacement="floating"
                         ngModel minlength="7" required #password="ngModel" name="password"></ion-input>
            </ion-item>

          </ion-list>
        </ion-col>
      </ion-row>
      <ion-row class="ion-justify-content-center">
        <ion-col size-sm="6">
          <ion-button
            type="submit"
            color="primary"
            shape="round"
            expand="block"
            [disabled]='logInForm.invalid'
          >Log In</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>

  <ion-row class="ion-justify-content-center">
    <ion-col size-sm="6" offset-sm="3" style="text-align: center; margin-top: 12px;">
      
      <p>
        Nemate nalog? Idi na stranicu za registraciju: 
        <a routerLink="/register">Register</a>
      </p>

    </ion-col>
  </ion-row>

</ion-content>

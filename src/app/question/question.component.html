<ion-content [fullscreen]="true">
  <div id="container">
    <h1><strong>{{questionText}}</strong></h1>
    <p>{{responseText}}</p>
    <p><ion-button>Odustani</ion-button><ion-button>></ion-button></p>
    @for (ans of answers; track ans) {
      <p><ion-button [attr.color] = "correctness[ans] !== undefined ? ( correctness[ans] ? 'success' : 'danger') : 'primary'" (click)="submitAnswer(ans)">{{ans}}</ion-button></p>
    }
  </div>
</ion-content>

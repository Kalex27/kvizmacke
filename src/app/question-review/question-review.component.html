<ion-content [fullscreen]="true">
  <div id="container">
    <p> Pitanje: {{qHash()}}</p>
    <hr />
    <hr />
    <ion-list>
      <ion-item>
        <ion-input label="Pitanje" [(ngModel)]="qText"/>
      </ion-item>
      <ion-item>
        <ion-input label="Tacan odgovor" [(ngModel)]="correctAnswer"/>
      </ion-item>
      @for (ans of wrongAnswers; track $index; let idx = $index) {
        <ion-item>
          <ion-input label="Netacan odgovor" [(ngModel)]="wrongAnswers[idx]"/>
        </ion-item>
      }
    </ion-list>
    <p><ion-button (click)="newWrong()">+</ion-button><ion-button (click)="removeWrong()">-</ion-button></p>
    <p>
    
    <ion-button (click)="updateQuestion()">Izmeni</ion-button>
    
    <ion-button (click)="giveUp()">ODUSTANI</ion-button>
    <ion-button (click)="delete()">OBRISI</ion-button>
   
   </p>
  </div>
</ion-content>
